<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents — Tenant Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .docs-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-16) var(--space-8);
      gap: var(--space-3);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }

    .docs-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: var(--space-16) var(--space-8);
      gap: var(--space-2);
    }
    .docs-empty__icon {
      width: 56px;
      height: 56px;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-subtle);
      margin-bottom: var(--space-2);
    }
    .docs-empty__title {
      font-size: var(--text-base);
      font-weight: var(--fw-semi);
      color: var(--color-text-muted);
    }
    .docs-empty__sub {
      font-size: var(--text-sm);
      color: var(--color-text-subtle);
      max-width: 300px;
      line-height: 1.6;
      margin: 0;
    }

    .docs-section + .docs-section {
      margin-top: var(--space-8);
    }
    .docs-section__heading {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .docs-section__title {
      font-size: var(--text-xs);
      font-weight: var(--fw-semi);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
    }
    .docs-section__count {
      font-size: var(--text-xs);
      color: var(--color-text-subtle);
      font-weight: var(--fw-medium);
    }

    .doc-row {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4) 0;
      border-bottom: 1px solid var(--color-border-light);
    }
    .doc-row:first-child { padding-top: 0; }
    .doc-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .doc-row__info {
      flex: 1;
      min-width: 0;
    }
    .doc-row__name {
      display: block;
      font-size: var(--text-base);
      font-weight: var(--fw-medium);
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: var(--space-1);
    }
    .doc-row__meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .doc-row__date {
      font-size: var(--text-xs);
      color: var(--color-text-subtle);
    }
    .doc-row__action { flex-shrink: 0; }

    @media (max-width: 480px) {
      .doc-row { gap: var(--space-3); }
      .doc-row__action .btn {
        font-size: var(--text-xs);
        padding: var(--space-2) var(--space-3);
      }
    }
  </style>
</head>
<body class="page">

  <nav class="navbar">
    <div class="container">
      <div class="navbar__inner">

        <a href="dashboard.html" class="navbar__brand">
          <div class="navbar__brand-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          Tenant<span>Portal</span>
        </a>

        <button class="navbar__menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="navbar__nav">
          <a href="documents.html" class="nav-link">Documents</a>
          <a href="maintenance.html" class="nav-link">Maintenance</a>
          <a href="contact.html" class="nav-link">Contact</a>
          <button class="btn btn--ghost btn--sm" data-logout>Log out</button>
        </div>

      </div>
    </div>
  </nav>

  <main class="page-content">
    <div class="container container--lg">

      <div class="page-header">
        <div class="page-header__text">
          <h1 class="page-header__title">Your Documents</h1>
          <p class="page-header__subtitle">View and download your lease agreement and payment receipts.</p>
        </div>
      </div>

      <div class="card card--padded card--raised">

        <div id="docs-loading" class="docs-loading">
          <div class="spinner spinner--dark"></div>
          <span>Loading your documents…</span>
        </div>
        <div id="docs-content" hidden></div>
        <div id="docs-alert"></div>

      </div>

    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    requireAuth();

    const loadingEl = document.getElementById('docs-loading');
    const contentEl = document.getElementById('docs-content');

    const TYPE_LEASE = 'Lease';

    const DOC_STYLES = {
      [TYPE_LEASE]: { badge: 'badge--accent', icon: 'icon-badge--accent' },
    };
    const DOC_STYLES_DEFAULT = { badge: 'badge--neutral', icon: 'icon-badge--neutral' };

    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str + 'T00:00:00');
      if (isNaN(d)) return str;
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function safeUrl(url) {
      try {
        const u = new URL(url);
        return (u.protocol === 'https:' || u.protocol === 'http:') ? url : '#';
      } catch {
        return '#';
      }
    }

    function fileIconSvg(type) {
      if (type === TYPE_LEASE) {
        return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>`;
      }
      return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"/>
        <line x1="8" y1="9" x2="16" y2="9"/>
        <line x1="8" y1="13" x2="14" y2="13"/>
      </svg>`;
    }

    function renderDocRow(doc) {
      const styles = DOC_STYLES[doc.Type] || DOC_STYLES_DEFAULT;
      const url    = safeUrl(doc.URL || '');

      return `<div class="doc-row">
        <div class="icon-badge ${styles.icon}">${fileIconSvg(doc.Type)}</div>
        <div class="doc-row__info">
          <span class="doc-row__name">${escapeHtml(doc.Name)}</span>
          <div class="doc-row__meta">
            <span class="badge ${styles.badge}">${escapeHtml(doc.Type)}</span>
            ${doc.Date ? `<span class="doc-row__date">${escapeHtml(formatDate(doc.Date))}</span>` : ''}
          </div>
        </div>
        <div class="doc-row__action">
          <a href="${escapeHtml(url)}" class="btn btn--secondary btn--sm" target="_blank" rel="noopener noreferrer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            View
          </a>
        </div>
      </div>`;
    }

    function renderSection(title, docs) {
      if (docs.length === 0) return '';
      return `<div class="docs-section">
        <div class="docs-section__heading">
          <span class="docs-section__title">${escapeHtml(title)}</span>
          <span class="docs-section__count">${docs.length} ${docs.length === 1 ? 'file' : 'files'}</span>
        </div>
        ${docs.map(renderDocRow).join('')}
      </div>`;
    }

    function renderEmpty() {
      return `<div class="docs-empty">
        <div class="docs-empty__icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <p class="docs-empty__title">No documents on file yet.</p>
        <p class="docs-empty__sub">Your lease agreement and payment receipts will appear here once they're available.</p>
      </div>`;
    }

    async function loadDocuments() {
      try {
        const data = await apiPost(WEBHOOKS.getDocuments, { 'Access Code': getAccessCode() });
        const docs = Array.isArray(data) ? data : [];

        loadingEl.hidden = true;

        if (docs.length === 0) {
          contentEl.innerHTML = renderEmpty();
          contentEl.hidden = false;
          return;
        }

        const leases   = docs.filter(d => d.Type === TYPE_LEASE);
        // Non-lease docs (receipts + any unrecognized types) sorted newest first
        const receipts = docs
          .filter(d => d.Type !== TYPE_LEASE)
          .sort((a, b) => new Date(b.Date) - new Date(a.Date));

        contentEl.innerHTML = renderSection('Lease Agreement', leases)
                            + renderSection('Payment Receipts', receipts);
        contentEl.hidden = false;

      } catch (err) {
        loadingEl.hidden = true;
        showAlert('docs-alert', err.message || 'Unable to load documents. Please try again later.', 'error');
      }
    }

    loadDocuments();
  </script>

</body>
</html>
