<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance Request — Tenant Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .urgency-group {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .urgency-group .priority-chip {
      cursor: pointer;
      user-select: none;
      transition: box-shadow var(--transition), transform var(--transition-fast);
    }
    .urgency-group .priority-chip[aria-pressed="true"] {
      box-shadow: 0 0 0 2px currentColor;
    }
    .urgency-group .priority-chip:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body class="page">

  <!-- ── Navbar ─────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar__inner">

        <a href="dashboard.html" class="navbar__brand">
          <div class="navbar__brand-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          Tenant<span>Portal</span>
        </a>

        <button class="navbar__menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="navbar__nav">
          <a href="documents.html" class="nav-link">Documents</a>
          <a href="maintenance.html" class="nav-link">Maintenance</a>
          <a href="contact.html" class="nav-link">Contact</a>
          <button class="btn btn--ghost btn--sm" data-logout>Log out</button>
        </div>

      </div>
    </div>
  </nav>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main class="page-content">
    <div class="container container--md">

      <!-- Page header -->
      <div class="page-header">
        <div class="page-header__text">
          <h1 class="page-header__title">Submit a Maintenance Request</h1>
          <p class="page-header__subtitle">Describe the issue and we'll follow up promptly.</p>
        </div>
      </div>

      <!-- Form card -->
      <div class="card card--padded card--raised">

        <div id="form-alert"></div>

        <form id="maintenance-form" novalidate>

          <div class="form-group">
            <label for="issue-type" class="label-required">Issue Type</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8" x2="12" y2="12"/>
                  <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
              </span>
              <select id="issue-type" name="Issue Type" required>
                <option value="" disabled selected>Select an issue type…</option>
                <option value="Plumbing">Plumbing</option>
                <option value="Electrical">Electrical</option>
                <option value="Air Conditioning">Air Conditioning</option>
                <option value="Pest Control">Pest Control</option>
                <option value="Structural">Structural</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="description" class="label-required">Description</label>
            <textarea
              id="description"
              name="Description"
              rows="5"
              placeholder="Describe the issue in as much detail as possible — location, when it started, how severe it is…"
              required
            ></textarea>
          </div>

          <div class="form-group">
            <label class="label-required">Urgency</label>
            <div class="urgency-group" role="group" aria-label="Select urgency level" id="urgency-group">
              <button type="button" class="priority-chip priority-chip--normal" data-urgency="Normal" aria-pressed="true">
                <span class="priority-chip__dot"></span>
                Normal
              </button>
              <button type="button" class="priority-chip priority-chip--medium" data-urgency="Medium" aria-pressed="false">
                <span class="priority-chip__dot"></span>
                Medium
              </button>
              <button type="button" class="priority-chip priority-chip--urgent" data-urgency="Urgent" aria-pressed="false">
                <span class="priority-chip__dot"></span>
                Urgent
              </button>
            </div>
            <input type="hidden" name="Urgency" id="urgency-val" value="Normal">
            <p class="field-hint">Choose how quickly this needs to be addressed.</p>
          </div>

          <div class="form-group">
            <label for="photo">Photo <span class="text-subtle text-sm fw-normal">(optional)</span></label>
            <input
              type="file"
              id="photo"
              name="Photo"
              accept="image/*"
            >
            <p class="field-hint">Upload a photo of the issue to help us assess it faster. Max one image.</p>
          </div>

          <!-- Submit -->
          <div class="mt-8">
            <button type="submit" id="submit-btn" class="btn btn--primary btn--full btn--lg">
              Submit Request
              <span class="btn__arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
                </svg>
              </span>
            </button>
          </div>

        </form>
      </div>

    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    requireAuth();

    // ── Urgency chip selector ──────────────────────────────────
    const urgencyGroup  = document.getElementById('urgency-group');
    const urgencyInput  = document.getElementById('urgency-val');
    const urgencyChips  = urgencyGroup.querySelectorAll('[data-urgency]');

    urgencyGroup.addEventListener('click', (e) => {
      const chip = e.target.closest('[data-urgency]');
      if (!chip) return;
      urgencyChips.forEach(c => c.setAttribute('aria-pressed', 'false'));
      chip.setAttribute('aria-pressed', 'true');
      urgencyInput.value = chip.dataset.urgency;
    });

    const form        = document.getElementById('maintenance-form');
    const submitBtn   = document.getElementById('submit-btn');
    const issueTypeEl = form.querySelector('[name="Issue Type"]');
    const descEl      = form.querySelector('[name="Description"]');
    const photoEl     = form.querySelector('[name="Photo"]');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert('form-alert');

      const issueType   = issueTypeEl.value.trim();
      const description = descEl.value.trim();

      if (!issueType) {
        showAlert('form-alert', 'Please select an issue type.');
        issueTypeEl.focus();
        return;
      }
      if (!description) {
        showAlert('form-alert', 'Please describe the issue before submitting.');
        descEl.focus();
        return;
      }

      const formData = new FormData();
      formData.append('Issue Type',  issueType);
      formData.append('Description', description);
      formData.append('Urgency',     urgencyInput.value);
      formData.append('Access Code', getAccessCode());

      const photoFile = photoEl.files[0];
      if (photoFile) formData.append('Photo', photoFile);

      setLoading(submitBtn, true);
      try {
        await apiPostForm(WEBHOOKS.maintenance, formData);
        showAlert('form-alert', "Your request has been submitted. We'll be in touch soon.", 'success');
        form.reset();
        urgencyChips.forEach(c => c.setAttribute('aria-pressed', c.dataset.urgency === 'Normal' ? 'true' : 'false'));
        urgencyInput.value = 'Normal';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        showAlert('form-alert', err.message || DEFAULT_ERROR_MSG);
      } finally {
        setLoading(submitBtn, false);
      }
    });
  </script>

</body>
</html>
