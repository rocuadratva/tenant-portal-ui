<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message the Owner — Tenant Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page">

  <!-- ── Navbar ─────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar__inner">

        <a href="dashboard.html" class="navbar__brand">
          <div class="navbar__brand-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          Tenant<span>Portal</span>
        </a>

        <button class="navbar__menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="navbar__nav">
          <a href="documents.html" class="nav-link">Documents</a>
          <a href="maintenance.html" class="nav-link">Maintenance</a>
          <a href="contact.html" class="nav-link">Contact</a>
          <button class="btn btn--ghost btn--sm" data-logout>Log out</button>
        </div>

      </div>
    </div>
  </nav>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main class="page-content">
    <div class="container container--md">

      <!-- Page header -->
      <div class="page-header">
        <div class="page-header__text">
          <h1 class="page-header__title">Message the Owner</h1>
          <p class="page-header__subtitle">Have a question or concern? Send a message and we'll get back to you.</p>
        </div>
      </div>

      <!-- Form card -->
      <div class="card card--padded card--raised">

        <div id="form-alert"></div>

        <form id="contact-form" novalidate>

          <!-- Subject -->
          <div class="form-group">
            <label for="subject" class="label-required">Subject</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="4" y1="9" x2="20" y2="9"/>
                  <line x1="4" y1="15" x2="20" y2="15"/>
                  <line x1="10" y1="3" x2="8" y2="21"/>
                  <line x1="16" y1="3" x2="14" y2="21"/>
                </svg>
              </span>
              <input
                type="text"
                id="subject"
                name="Subject"
                placeholder="e.g. Question about my lease renewal"
                maxlength="200"
                required
              >
            </div>
          </div>

          <!-- Message -->
          <div class="form-group">
            <label for="message" class="label-required">Message</label>
            <textarea
              id="message"
              name="Message"
              rows="7"
              placeholder="Write your message here…"
              required
            ></textarea>
          </div>

          <!-- Phone (pre-filled from tenant data if available) -->
          <div class="form-group">
            <label for="phone">Your Phone Number <span class="text-subtle text-sm fw-normal">(optional)</span></label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l1.97-1.97a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
              </span>
              <input
                type="tel"
                id="phone"
                name="Phone"
                placeholder="e.g. 09171234567"
              >
            </div>
            <p class="field-hint">So we can reach you faster if needed.</p>
          </div>

          <!-- Submit -->
          <div class="mt-8">
            <button type="submit" id="submit-btn" class="btn btn--primary btn--full btn--lg">
              Send Message
              <span class="btn__arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </span>
            </button>
          </div>

        </form>
      </div>

    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    requireAuth();

    // Pre-fill phone from cached tenant data if available
    const phoneInput = document.getElementById('phone');
    const tenantPhone = getTenantData()?.['Phone'];
    if (tenantPhone) phoneInput.value = tenantPhone;

    // ── Form submission ────────────────────────────────────────
    const form      = document.getElementById('contact-form');
    const submitBtn = document.getElementById('submit-btn');
    const subjectEl = form.querySelector('[name="Subject"]');
    const messageEl = form.querySelector('[name="Message"]');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert('form-alert');

      const subject = subjectEl.value.trim();
      const message = messageEl.value.trim();
      const phone   = phoneInput.value.trim();

      if (!subject) {
        showAlert('form-alert', 'Please enter a subject for your message.');
        subjectEl.focus();
        return;
      }
      if (!message) {
        showAlert('form-alert', 'Please write a message before sending.');
        messageEl.focus();
        return;
      }

      const payload = {
        Subject:       subject,
        Message:       message,
        'Access Code': getAccessCode(),
      };
      if (phone) payload.Phone = phone;

      setLoading(submitBtn, true);
      try {
        await apiPost(WEBHOOKS.contact, payload);
        showAlert('form-alert', "Your message has been sent. We'll get back to you soon.", 'success');
        form.reset();
        if (tenantPhone) phoneInput.value = tenantPhone;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        showAlert('form-alert', err.message || DEFAULT_ERROR_MSG);
      } finally {
        setLoading(submitBtn, false);
      }
    });
  </script>

</body>
</html>
